# Topic taxonomy (open)
#
# We keep the maturity ladder: raw -> normalized -> derived -> insight.
#
# raw: vendor/native payloads (minimal transform)
# normalized: canonical semantics
# derived: computed artifacts (templates, groups, stories)
# insight: model outputs + explainability

